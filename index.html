<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cámaras Casa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0f;
      overflow: hidden;
    }

    /* Fondo animado */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 20%, rgba(99,102,241,0.15) 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 80% 80%, rgba(16,185,129,0.10) 0%, transparent 60%);
      animation: pulse-bg 8s ease-in-out infinite alternate;
      z-index: 0;
    }

    @keyframes pulse-bg {
      from { opacity: 0.6; transform: scale(1); }
      to   { opacity: 1;   transform: scale(1.05); }
    }

    .card {
      position: relative;
      z-index: 1;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 24px;
      padding: 48px 40px;
      width: min(420px, 94vw);
      backdrop-filter: blur(24px);
      box-shadow: 0 32px 80px rgba(0,0,0,0.6);
      text-align: center;
      animation: slide-up 0.6s cubic-bezier(.22,1,.36,1) both;
    }

    @keyframes slide-up {
      from { opacity: 0; transform: translateY(32px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .icon {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, #6366f1 0%, #10b981 100%);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 36px;
      box-shadow: 0 8px 32px rgba(99,102,241,0.4);
    }

    h1 {
      color: #fff;
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }

    .subtitle {
      color: rgba(255,255,255,0.45);
      font-size: 0.9rem;
      margin-bottom: 36px;
    }

    /* Estado del sistema */
    .status-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 32px;
      font-size: 0.82rem;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #6b7280;
      flex-shrink: 0;
      transition: background 0.3s;
    }
    .dot.online  { background: #10b981; box-shadow: 0 0 8px #10b981; animation: blink 2s infinite; }
    .dot.offline { background: #ef4444; }

    @keyframes blink {
      0%,100% { opacity: 1; } 50% { opacity: 0.3; }
    }

    .status-text { color: rgba(255,255,255,0.5); }

    /* Botón principal */
    .btn-main {
      display: block;
      width: 100%;
      padding: 16px 24px;
      background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
      box-shadow: 0 4px 20px rgba(99,102,241,0.45);
      position: relative;
      overflow: hidden;
    }

    .btn-main::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0);
      transition: background 0.2s;
    }

    .btn-main:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(99,102,241,0.6); }
    .btn-main:hover::after { background: rgba(255,255,255,0.07); }
    .btn-main:active { transform: translateY(0); }
    .btn-main.disabled { background: linear-gradient(135deg,#374151,#1f2937); box-shadow: none; cursor: not-allowed; }

    .btn-icon { margin-right: 8px; }

    .last-update {
      margin-top: 20px;
      color: rgba(255,255,255,0.25);
      font-size: 0.75rem;
    }

    .loading-pulse {
      display: inline-block;
      animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📷</div>
    <h1>Cámaras Casa</h1>
    <p class="subtitle">Sistema de vigilancia remota</p>

    <div class="status-row">
      <div class="dot" id="dot"></div>
      <span class="status-text" id="statusText"><span class="loading-pulse">Verificando...</span></span>
    </div>

    <a id="btnCamaras" class="btn-main disabled" href="#" target="_blank" rel="noopener">
      <span class="btn-icon">🎥</span> Ver Cámaras
    </a>

    <p class="last-update" id="lastUpdate"></p>
  </div>

  <script>
    const CACHE = 'url.json?t=' + Date.now();

    async function cargarUrl() {
      const dot  = document.getElementById('dot');
      const txt  = document.getElementById('statusText');
      const btn  = document.getElementById('btnCamaras');
      const upd  = document.getElementById('lastUpdate');

      try {
        const res  = await fetch(CACHE);
        const data = await res.json();

        if (data.url && data.url !== 'pendiente') {
          dot.className  = 'dot online';
          txt.textContent = 'Sistema activo';
          btn.href       = data.url + '/visor.html';
          btn.classList.remove('disabled');

          if (data.updated) {
            const d = new Date(data.updated);
            upd.textContent = 'Última actualización: ' + d.toLocaleString('es-AR');
          }
        } else {
          dot.className   = 'dot offline';
          txt.textContent = 'Sistema apagado o en espera…';
        }
      } catch(e) {
        dot.className   = 'dot offline';
        txt.textContent = 'No se pudo verificar el estado';
      }
    }

    cargarUrl();
    // Refresca cada 60 segundos
    setInterval(() => { location.reload(); }, 60000);
  </script>
</body>
</html>
